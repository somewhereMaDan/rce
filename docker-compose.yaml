services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      HOST_TEMP_PATH: ${PWD}/server/temp
      # whole path currently - /c/Users/madan/OneDrive/Desktop/work/rce/server/temp
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./server/temp:/app/temp
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server
    restart: unless-stopped
